<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Acceso privado</title>

<style>
:root{
--bg:#0f0f0f;
--panel:#1c1c1c;
--text:#fff;
--accent:#1e88e5;
--square-size:60px;
}

*{box-sizing:border-box;}

html,body{
margin:0;
height:100%;
background:var(--bg);
color:var(--text);
font-family:Arial,sans-serif;
overflow:hidden;
}

.screen{
display:none;
height:100vh;
width:100%;
justify-content:center;
align-items:center;
flex-direction:column;
padding:20px;
}

/* LOGIN */

#loginBox{display:flex;}

.container{
background:var(--panel);
padding:26px;
border-radius:12px;
box-shadow:0 6px 30px rgba(0,0,0,0.6);
max-width:420px;
width:90%;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
font-size:16px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:var(--accent);
color:#fff;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

.error-msg{
color:#ff6b6b;
font-size:14px;
margin-top:2px;
display:none;
}

/* PUZZLE */

#puzzlePage{
position:relative;
overflow:hidden;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

#bgGrid{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:grid;
z-index:0;
}

.square{width:100%;height:100%;}
.black{background:black;}
.white{background:white;}

.corner{
position:absolute;
width:var(--square-size);
height:var(--square-size);
background:black;
z-index:5;
}

.top-left{top:0;left:0;}
.top-right{top:0;right:0;}
.bottom-left{bottom:0;left:0;}
.bottom-right{bottom:0;right:0;}

.images{
display:flex;
gap:20px;
margin-top:20px;
z-index:2;
}

.img-box{
width:200px;
height:200px;
background:#ddd;
border-radius:8px;
display:flex;
justify-content:center;
align-items:center;
}

#rightImg svg{transform:rotate(30deg);}
#leftSVG{transition:transform .1s linear;}

.controls{
margin-top:20px;
z-index:2;
text-align:center;
}

.controls input{width:300px;}

.attempts{margin-top:8px;}

/* VIDEO (MEJORADO PARA VIDEO VERTICAL) */

#videoPage{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
gap:20px;
}

.video-wrapper{

display:flex;
justify-content:center;
align-items:center;

height:90vh;
width:100%;

}

video{

height:90vh;
max-height:900px;

width:auto;

border-radius:14px;

box-shadow:
0 0 40px rgba(0,0,0,0.8),
0 0 120px rgba(0,0,0,0.9);

background:black;

}

.video-title{

font-size:22px;
letter-spacing:1px;
opacity:0.9;

}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginBox" class="screen">

<div class="container">

<h2>Acceso privado</h2>

<input id="user" placeholder="Usuario">
<div id="userError" class="error-msg">El usuario no puede estar vacio</div>

<input id="pass" type="password" placeholder="Contraseña">
<div id="passError" class="error-msg">La contraseña no puede estar vacio</div>

<button id="btnEnter">Entrar</button>

</div>

</div>


<!-- PUZZLE -->

<div id="puzzlePage" class="screen">

<div id="bgGrid"></div>

<div class="corner top-left"></div>
<div class="corner top-right" id="cornerTR"></div>
<div class="corner bottom-left" id="cornerBL"></div>
<div class="corner bottom-right"></div>

<h3 style="z-index:2">Verificación adicional requerida</h3>

<div class="images">

<div id="leftImg" class="img-box">

<svg viewBox="0 0 100 100">
<g id="leftSVG">
<rect x="20" y="20" width="60" height="60" fill="#1e88e5"/>
<circle cx="50" cy="50" r="14" fill="#fff"/>
</g>
</svg>

</div>

<div id="rightImg" class="img-box">

<svg viewBox="0 0 100 100">
<rect x="20" y="20" width="60" height="60" fill="#1e88e5"/>
<circle cx="50" cy="50" r="14" fill="#fff"/>
</svg>

</div>

</div>

<div class="controls">

<label>Ángulo: <span id="angleLabel">0°</span></label><br>
<input id="rotRange" type="range" min="0" max="359" value="0">

<br><br>

<button id="btnCheck">Comprobar</button>

<div class="attempts">Intentos restantes: <span id="attemptsCount">3</span></div>

</div>

</div>


<!-- VIDEO -->

<div id="videoPage" class="screen">

<div class="video-title">Video privado</div>

<div class="video-wrapper">

<video id="mainVideo" controls controlsList="nodownload">
<source src="video.mp4" type="video/mp4">
</video>

</div>

</div>


<script>

const loginBox=document.getElementById("loginBox")
const puzzlePage=document.getElementById("puzzlePage")
const videoPage=document.getElementById("videoPage")

const user=document.getElementById("user")
const pass=document.getElementById("pass")

const btnEnter=document.getElementById("btnEnter")

const rotRange=document.getElementById("rotRange")
const leftSVG=document.getElementById("leftSVG")
const angleLabel=document.getElementById("angleLabel")

const attemptsCount=document.getElementById("attemptsCount")

const cornerBL=document.getElementById("cornerBL")
const cornerTR=document.getElementById("cornerTR")

const bgGrid=document.getElementById("bgGrid")

let attempts=3
let secret=0

/* FONDO */

function generateGrid(){

const size=60
const cols=Math.ceil(window.innerWidth/size)
const rows=Math.ceil(window.innerHeight/size)

bgGrid.style.gridTemplateColumns=`repeat(${cols},1fr)`
bgGrid.style.gridTemplateRows=`repeat(${rows},1fr)`

bgGrid.innerHTML=""

for(let y=0;y<rows;y++){
for(let x=0;x<cols;x++){

const div=document.createElement("div")

if((x+y)%2==0) div.className="square black"
else div.className="square white"

bgGrid.appendChild(div)

}
}

}

generateGrid()
window.addEventListener("resize",generateGrid)

/* LOGIN */

function tryLogin(){

const u=user.value.trim()
const p=pass.value

if(u==="00si" && p===""){

loginBox.style.display="none"
puzzlePage.style.display="flex"

}

}

btnEnter.onclick=tryLogin

user.addEventListener("keydown",e=>{if(e.key==="Enter")tryLogin()})
pass.addEventListener("keydown",e=>{if(e.key==="Enter")tryLogin()})

/* ROTACION */

rotRange.oninput=function(){

leftSVG.setAttribute("transform","rotate("+this.value+" 50 50)")
angleLabel.textContent=this.value+"°"

}

/* SECRETO */

cornerBL.onclick=function(){

if(secret===0)secret=1
else secret=0

}

cornerTR.onclick=function(){

if(secret===1){

puzzlePage.style.display="none"
videoPage.style.display="flex"

}

secret=0

}

</script>

</body>
</html>
