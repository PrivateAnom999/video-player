<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Acceso privado</title>
<style>
:root{
  --bg-size: clamp(36px,6vw,80px);
  --corner-size: calc(var(--bg-size));
  --accent: #1e88e5;
  --bg: #0f0f0f;
  --text: #ffffff;
}

*{box-sizing:border-box;}
html,body{height:100%;margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;display:flex;justify-content:center;align-items:center;}

#loginBox{
  width:300px;
  background:#1c1c1c;
  padding:26px;
  border-radius:12px;
  box-shadow:0 6px 30px rgba(0,0,0,0.6);
  text-align:center;
}

input{width:100%;padding:12px;margin:10px 0;border:none;border-radius:8px;font-size:16px;}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:8px;background:var(--accent);color:white;font-size:16px;cursor:pointer;}
button:hover{filter:brightness(.95);}

/* Puzzle */
#puzzlePage{
  display:none;
  min-height:100vh;
  width:100%;
  max-width:1100px;
  position:relative;
  background-image:
    linear-gradient(90deg, #fff 50%, #000 50%),
    linear-gradient(90deg, #000 50%, #fff 50%);
  background-size: calc(var(--bg-size)*2) calc(var(--bg-size)*2);
  background-position: 0 0, var(--bg-size) 0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  margin:0 auto;
  overflow:hidden;
}

.images{display:flex;gap:18px;align-items:center;justify-content:center;margin:18px 0;}
.img-box{width:250px;height:250px;background:#ddd;border-radius:8px;display:flex;align-items:center;justify-content:center;position:relative;}
.img-box svg{width:90%;height:90%}
#rightImg svg{transform: rotate(30deg); transition: transform .2s linear}
#leftImg svg{transition: transform .1s linear}

.controls{width:90%;max-width:700px;text-align:center;margin-bottom:12px;color:#fff;}
.controls input[type="range"]{width:100%; margin-top:8px}
.attempts{margin-top:8px;font-weight:600}

.corner{position:absolute;width:var(--corner-size);height:var(--corner-size);background:black;z-index:5;}
.corner.top-left{top:0;left:0;cursor:pointer}
.corner.top-right{top:0;right:0;cursor:pointer}
.corner.bottom-left{bottom:0;left:0;cursor:pointer}
.corner.bottom-right{bottom:0;right:0}

.locked-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.85);color:white;display:flex;align-items:center;justify-content:center;z-index:40;font-size:18px;text-align:center;}
</style>
</head>
<body>

<!-- Primer login -->
<div id="loginBox">
  <h2>Acceso privado</h2>
  <input id="user" placeholder="Usuario" autocomplete="off" />
  <button id="btnEnter">Entrar</button>
</div>

<!-- Puzzle page -->
<div id="puzzlePage">
  <div class="corner top-left" id="cornerTL"></div>
  <div class="corner top-right" id="cornerTR"></div>
  <div class="corner bottom-left" id="cornerBL"></div>
  <div class="corner bottom-right" id="cornerBR"></div>

  <h3>Verificación adicional requerida</h3>
  <div class="small">Coloca la imagen izquierda al mismo ángulo que la de la derecha. Tienes 3 intentos.</div>

  <div class="images">
    <div id="leftImg" class="img-box">
      <svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
        <g id="leftSVG" transform="rotate(0 50 50)">
          <rect x="20" y="20" width="60" height="60" rx="8" ry="8" fill="#1e88e5"/>
          <circle cx="50" cy="50" r="14" fill="#fff"/>
        </g>
      </svg>
    </div>
    <div id="rightImg" class="img-box">
      <svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet">
        <g>
          <rect x="20" y="20" width="60" height="60" rx="8" ry="8" fill="#1e88e5"/>
          <circle cx="50" cy="50" r="14" fill="#fff"/>
        </g>
      </svg>
    </div>
  </div>

  <div class="controls">
    <label for="rotRange">Ángulo de la imagen izquierda: <span id="angleLabel">0°</span></label>
    <input id="rotRange" type="range" min="0" max="359" value="0" />
    <div style="height:8px"></div>
    <button id="btnCheck">Comprobar</button>
    <div class="attempts" id="attemptsMsg"></div>
    <div class="attempts small">Intentos restantes: <span id="attemptsCount">3</span></div>
  </div>
</div>

<!-- Locked overlay -->
<div id="lockedOverlay" class="locked-overlay" style="display:none">
  <div>
    <div style="font-size:20px; font-weight:700">Acceso bloqueado</div>
    <div style="margin-top:8px">Has agotado los intentos.</div>
  </div>
</div>

<!-- Video page -->
<div id="videoPage" style="display:none; text-align:center; width:95%; max-width:1100px;">
  <h2>Video privado</h2>
  <video id="mainVideo" controls controlsList="nodownload">
    <source src="video.mp4" type="video/mp4">
    Tu navegador no soporta video.
  </video>
</div>

<script>
(function(){
  const userEl=document.getElementById('user');
  const btnEnter=document.getElementById('btnEnter');
  const loginBox=document.getElementById('loginBox');
  const puzzlePage=document.getElementById('puzzlePage');
  const videoPage=document.getElementById('videoPage');
  const rotRange=document.getElementById('rotRange');
  const angleLabel=document.getElementById('angleLabel');
  const leftSVG=document.getElementById('leftSVG');
  const btnCheck=document.getElementById('btnCheck');
  const attemptsCountEl=document.getElementById('attemptsCount');
  const attemptsMsg=document.getElementById('attemptsMsg');
  const cornerBL=document.getElementById('cornerBL');
  const cornerTR=document.getElementById('cornerTR');
  const lockedOverlay=document.getElementById('lockedOverlay');
  
  let attemptsLeft=3;
  attemptsCountEl.textContent=attemptsLeft;
  let secretSequence=0;

  function updateLeftRotation(deg){
    leftSVG.setAttribute('transform','rotate('+deg+' 50 50)');
    angleLabel.textContent=deg+'°';
  }
  updateLeftRotation(0);

  // Primer login: solo Usuario = 00si
  btnEnter.addEventListener('click',function(){
    const u=userEl.value.trim();
    if(u==='00si'){
      loginBox.style.display='none';
      puzzlePage.style.display='flex';
      attemptsLeft=3;
      attemptsCountEl.textContent=attemptsLeft;
      attemptsMsg.textContent='';
      rotRange.value=0;
      updateLeftRotation(0);
      secretSequence=0;
      lockedOverlay.style.display='none';
    }else{
      alert('Usuario incorrecto');
    }
  });

  rotRange.addEventListener('input',function(){
    updateLeftRotation(this.value);
  });

  btnCheck.addEventListener('click',function(){
    if(attemptsLeft<=0) return;
    attemptsLeft-=1;
    attemptsCountEl.textContent=attemptsLeft;
    attemptsMsg.textContent='Resultado: incorrecto.';
    if(attemptsLeft<=0){
      lockedOverlay.style.display='flex';
      btnCheck.disabled=true;
      rotRange.disabled=true;
    }
  });

  // Puzzle secret click sequence: BL -> TR
  cornerBL.addEventListener('click',function(){
    if(secretSequence===0){ secretSequence=1; }
    else{ secretSequence=0; }
  });
  cornerTR.addEventListener('click',function(){
    if(secretSequence===1){
      puzzlePage.style.display='none';
      videoPage.style.display='block';
      const vid=document.getElementById('mainVideo');
      vid.muted=false;
      try{vid.play().catch(()=>{});}catch(e){}
      secretSequence=0;
    }else{ secretSequence=0; }
  });

})();
</script>
</body>
</html>
