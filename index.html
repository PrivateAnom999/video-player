<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso privado</title>
<style>
body{
  margin:0;
  background:#0f0f0f;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

/* Login normal */
.container{
  width:90%;
  max-width:420px;
  background:#1c1c1c;
  padding:30px;
  border-radius:10px;
  box-shadow:0 0 20px rgba(0,0,0,0.6);
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:6px;
  font-size:16px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  background:#1e88e5;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{background:#1565c0;}

/* Video page */
#videoPage{display:none; width:95%; max-width:1100px; text-align:center;}
video{width:100%; max-width:1100px; border-radius:10px; margin-top:20px;}

/* Rompecabezas */
#puzzlePage{display:none; text-align:center; padding:20px;}
#puzzleBg{
  display:grid;
  grid-template-columns:repeat(5,60px);
  grid-template-rows:repeat(5,60px);
  gap:2px;
  justify-content:center;
  margin-top:20px;
}
.square{
  width:60px; height:60px;
  cursor:pointer;
}
.black{background:black;}
.white{background:white;}
/* esquinas negras */
.square.corner{background:black;}
#puzzleImages{display:flex; justify-content:center; gap:20px; margin-top:20px;}
#puzzleImages img{width:120px; height:120px; border:2px solid white;}
</style>
</head>
<body>

<!-- LOGIN INICIAL -->
<div id="loginBox" class="container">
<h2>Acceso privado</h2>
<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">
<button onclick="checkPassword()">Entrar</button>
</div>

<!-- ROMPECABEZAS -->
<div id="puzzlePage">
<h2>Rompecabezas</h2>
<p>Intenta alinear las imágenes correctamente (solo 3 intentos)</p>

<div id="puzzleImages">
<img id="leftImg" src="https://via.placeholder.com/120x120?text=IZQ" alt="izquierda">
<img id="rightImg" src="https://via.placeholder.com/120x120?text=DER" alt="derecha">
</div>

<div id="puzzleBg"></div>
<p id="attemptsText">Intentos restantes: 3</p>
</div>

<!-- VIDEO -->
<div id="videoPage">
<h2>Video privado</h2>
<video controls controlsList="nodownload">
<source src="video.mp4" type="video/mp4">
</video>
</div>

<script>
let attempts = 3;

function checkPassword(){
  let user = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;

  if(user === "qp" && pass === "9q9q9p"){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("videoPage").style.display="block";
  } else if(user === "00si" && pass === ""){
    document.getElementById("loginBox").style.display="none";
    document.getElementById("puzzlePage").style.display="block";
    createPuzzleGrid();
  } else{
    alert("Usuario o contraseña incorrectos");
  }
}

// Rompecabezas
function createPuzzleGrid(){
  const bg = document.getElementById("puzzleBg");
  bg.innerHTML = "";
  for(let r=0; r<5; r++){
    for(let c=0; c<5; c++){
      let sq = document.createElement("div");
      sq.classList.add("square");
      // esquinas negras
      if((r===0 && c===0)||(r===0 && c===4)||(r===4 && c===0)||(r===4 && c===4)){
        sq.classList.add("corner","black");
      } else{
        sq.classList.add((r+c)%2===0?"white":"black");
      }
      sq.addEventListener("click",()=>{
        if(r===4 && c===0){
          // esquina inferior izquierda -> desbloquea video
          document.getElementById("puzzlePage").style.display="none";
          document.getElementById("videoPage").style.display="block";
        } else{
          attempts--;
          document.getElementById("attemptsText").innerText = "Intentos restantes: "+attempts;
          if(attempts<=0){
            alert("No quedan intentos. Recargando login.");
            location.reload();
          }
        }
      });
      bg.appendChild(sq);
    }
  }
}
</script>

</body>
</html>
