<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Acceso privado</title>

<style>

:root{
--bg:#0f0f0f;
--panel:#1c1c1c;
--text:#fff;
--accent:#1e88e5;
--square-size:60px;
}

*{box-sizing:border-box;}

html,body{
margin:0;
height:100%;
background:var(--bg);
color:var(--text);
font-family:Arial,sans-serif;
overflow:hidden;
}

.screen{
display:none;
height:100vh;
width:100%;
justify-content:center;
align-items:center;
flex-direction:column;
padding:20px;
}

/* LOGIN */

#loginBox{display:flex;}

.container{
background:var(--panel);
padding:26px;
border-radius:12px;
box-shadow:0 6px 30px rgba(0,0,0,0.6);
max-width:420px;
width:90%;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
font-size:16px;
}

button{
padding:10px 14px;
border:none;
border-radius:8px;
background:var(--accent);
color:#fff;
font-size:15px;
cursor:pointer;
}

/* PUZZLE */

#puzzlePage{
position:relative;
overflow:hidden;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
gap:10px;
}

#bgGrid{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:grid;
z-index:0;
}

.square{width:100%;height:100%;}
.black{background:black;}
.white{background:white;}

.corner{
position:absolute;
width:var(--square-size);
height:var(--square-size);
background:black;
z-index:20;
}

.corner::after{
content:"";
position:absolute;
width:120px;
height:120px;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

.top-left{top:0;left:0;}
.top-right{top:0;right:0;}
.bottom-left{bottom:0;left:0;}
.bottom-right{bottom:0;right:0;}

.images{
display:flex;
gap:20px;
z-index:2;
}

.img-box{
width:180px;
height:180px;
background:#ddd;
border-radius:8px;
display:flex;
justify-content:center;
align-items:center;
}

#rightImg svg{transform:rotate(30deg);}
#leftSVG{transition:transform .1s linear;}

.controls{
z-index:2;
max-width:400px;
width:90%;
}

/* VIDEO */

#videoPage{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:black;
gap:20px;
}

.video-wrapper{
display:flex;
justify-content:center;
align-items:center;
height:70vh;
}

video{
height:70vh;
border-radius:14px;
}

/* CARGA */

#loadingPage{
display:flex;
background:black;
}

.loader{
width:70px;
height:70px;
border:8px solid #333;
border-top:8px solid #1e88e5;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="loginBox" class="screen">

<div class="container">

<h2>Acceso privado</h2>

<input id="user" autocomplete="off" placeholder="Usuario">
<input id="pass" type="password" autocomplete="off" placeholder="Contraseña">

<button id="btnEnter">Entrar</button>

</div>

</div>


<!-- CARGA -->

<div id="loadingPage" class="screen">

<div class="loader"></div>

</div>


<!-- PUZZLE -->

<div id="puzzlePage" class="screen">

<div id="bgGrid"></div>

<div class="corner top-left"></div>
<div class="corner top-right" id="cornerTR"></div>
<div class="corner bottom-left" id="cornerBL"></div>
<div class="corner bottom-right"></div>

<h3 style="z-index:2">Verificación adicional requerida</h3>

<div class="images">

<div class="img-box">
<svg viewBox="0 0 100 100">
<g id="leftSVG">
<rect x="20" y="20" width="60" height="60" fill="#1e88e5"/>
<circle cx="50" cy="50" r="14" fill="#fff"/>
</g>
</svg>
</div>

<div id="rightImg" class="img-box">
<svg viewBox="0 0 100 100">
<rect x="20" y="20" width="60" height="60" fill="#1e88e5"/>
<circle cx="50" cy="50" r="14" fill="#fff"/>
</svg>
</div>

</div>

<div class="controls">

<label>Ángulo: <span id="angleLabel">0°</span></label>

<input id="rotRange" type="range" min="0" max="359" value="0">

<button id="btnCheck">Comprobar</button>

</div>

</div>


<!-- VIDEO -->

<div id="videoPage" class="screen">

<div class="video-wrapper">

<video controls controlsList="nodownload">
<source src="video.mp4" type="video/mp4">
</video>

</div>

</div>


<script>

const loginBox=document.getElementById("loginBox")
const puzzlePage=document.getElementById("puzzlePage")
const videoPage=document.getElementById("videoPage")
const loadingPage=document.getElementById("loadingPage")

const user=document.getElementById("user")
const pass=document.getElementById("pass")
const btnEnter=document.getElementById("btnEnter")

const rotRange=document.getElementById("rotRange")
const leftSVG=document.getElementById("leftSVG")
const angleLabel=document.getElementById("angleLabel")

const cornerBL=document.getElementById("cornerBL")
const cornerTR=document.getElementById("cornerTR")

const bgGrid=document.getElementById("bgGrid")

let secret=0

function clearInputs(){
user.value=""
pass.value=""
}

/* LOGIN */

function tryLogin(){

const u=user.value.trim()
const p=pass.value

/* ADMIN → CARGA */

if(u==="admin" && p==="1234"){

loginBox.style.display="none"
loadingPage.style.display="flex"

setTimeout(()=>{

loadingPage.style.display="none"
loginBox.style.display="flex"
clearInputs()

},20000)

return
}

/* ACCESO REAL */

if(u==="00si" && p===""){

loginBox.style.display="none"
puzzlePage.style.display="flex"
clearInputs()
return

}

clearInputs()

}

btnEnter.onclick=tryLogin

user.addEventListener("keydown",e=>{if(e.key==="Enter")tryLogin()})
pass.addEventListener("keydown",e=>{if(e.key==="Enter")tryLogin()})

/* FONDO */

function generateGrid(){

const size=60
const cols=Math.ceil(window.innerWidth/size)
const rows=Math.ceil(window.innerHeight/size)

bgGrid.style.gridTemplateColumns=`repeat(${cols},1fr)`
bgGrid.style.gridTemplateRows=`repeat(${rows},1fr)`

bgGrid.innerHTML=""

for(let y=0;y<rows;y++){
for(let x=0;x<cols;x++){

const div=document.createElement("div")

if((x+y)%2==0) div.className="square black"
else div.className="square white"

bgGrid.appendChild(div)

}
}

}

generateGrid()
window.addEventListener("resize",generateGrid)

/* ROTACION */

rotRange.oninput=function(){

leftSVG.setAttribute("transform","rotate("+this.value+" 50 50)")
angleLabel.textContent=this.value+"°"

}

/* SECRETO */

cornerBL.onclick=function(){

if(secret===0)secret=1
else secret=0

}

cornerTR.onclick=function(){

if(secret===1){

puzzlePage.style.display="none"
videoPage.style.display="flex"

}

secret=0

}

</script>

</body>
</html>
